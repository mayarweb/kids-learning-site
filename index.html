<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تعلم مع الأطفال</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#fef6f9;
}
header{
background:#ffb6c1;
padding:20px;
font-size:28px;
}
section{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px #ddd;
}
.word{font-size:24px;margin:10px;}
</style>
</head>

<body>

<header>موقع تعليم الأطفال</header>

<section>
<h2>أرقام بالعربي</h2>
<div class="word">1 = واحد</div>
<div class="word">2 = اثنان</div>
<div class="word">3 = ثلاثة</div>
<div class="word">4 = أربعة</div>
<div class="word">5 = خمسة</div>
</section>

<section>
<h2>Numbers in English</h2>
<div class="word">1 = One</div>
<div class="word">2 = Two</div>
<div class="word">3 = Three</div>
<div class="word">4 = Four</div>
<div class="word">5 = Five</div>
</section>

<section>
<h2>كلمات إنجليزي للأطفال</h2>
<div class="word">Apple 🍎</div>
<div class="word">Cat 🐱</div>
<div class="word">Dog 🐶</div>
<div class="word">Sun ☀️</div>
<div class="word">Moon 🌙</div>
</section>

</body>
</html>
